<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>domain.cv</title>
    <style>
        /* --- Base Setup --- */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Noto Serif JP', serif; color: white; }

        /* --- 1. Webcam Feed (Picture-in-Picture) --- */
        #input_video {
            position: fixed; 
            bottom: 22px; 
            right: 22px; 
            width: 250px; 
            height: 162px; 
            border-radius: 10px;
            border: 2px solid rgba(0, 255, 255, 0.5); /* Gives it a cool glowing border */
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            object-fit: cover; 
            z-index: 50; /* Ensures it sits above all the 3D and 2D canvases */
            transform: scaleX(-1);
        }

        /* --- 2. Unified Cinematic Canvases --- */
        #gl-canvas, #fx-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: block; pointer-events: none;
        }
        #gl-canvas { z-index: 5; }  /* WebGL (Chimera) goes behind 2D FX */
        #fx-canvas { z-index: 10; } /* 2D Canvas (Void, Shrine, Chimera overlays) */

        /* --- 3. Cinematic Flash & Titles --- */
        #flash {
            position: fixed; inset: 0; z-index: 40; pointer-events: none;
            background: #fff; opacity: 0; transition: background 0.1s;
        }

        #domain-title {
            position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%);
            z-index: 25; text-align: center; opacity: 0; pointer-events: none; white-space: nowrap;
            transition: opacity 1.2s ease;
        }
        #domain-title .jp { font-size: 14px; letter-spacing: 0.6em; display: block; margin-bottom: 7px; font-weight: 200; }
        #domain-title .en { font-size: 32px; letter-spacing: 0.32em; display: block; font-weight: 900; }

        /* Themed Title Colors */
        .theme-void .jp { color: rgba(160,220,255,.5); }
        .theme-void .en { color: rgba(255,255,255,.85); text-shadow: 0 0 30px rgba(100,200,255,.7), 0 0 70px rgba(60,140,220,.3); }
        
        .theme-shrine .jp { color: rgba(255,80,40,.7); }
        .theme-shrine .en { color: rgba(255,255,255,.9); text-shadow: 0 0 20px rgba(255,40,0,.9), 0 0 50px rgba(180,0,0,.6), 0 0 100px rgba(100,0,0,.3); }
        
        .theme-chimera .jp { color: rgba(180,80,255,.7); }
        .theme-chimera .en { color: rgba(255,255,255,.9); text-shadow: 0 0 20px rgba(150,0,255,.9), 0 0 50px rgba(80,0,200,.6), 0 0 100px rgba(40,0,100,.3); }

        /* --- 4. Shared UI Overlay --- */
        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 30; pointer-events: none; }
        .status-card { background: rgba(0, 0, 0, 0.6); padding: 20px; border-left: 4px solid #00ffff; pointer-events: auto; }
        #domain-name-display { color: #00ffff; text-transform: uppercase; font-family: sans-serif; }
        
        #energy-meter-container { margin-top: 10px; width: 300px; font-family: sans-serif; }
        #energy-label { font-size: 12px; letter-spacing: 2px; color: #00ffff; margin-bottom: 5px; }
        #energy-meter-path { width: 100%; height: 10px; background: rgba(255,255,255,0.2); border: 1px solid #00ffff; }
        #energy-meter-fill { width: 0%; height: 100%; background: #00ffff; box-shadow: 0 0 10px #00ffff; transition: width 0.1s; }

        /* --- 5. Guide Squares --- */
        #guide-layer { position: absolute; top: 20px; right: 20px; z-index: 30; display: flex; flex-direction: column; gap: 10px; font-family: sans-serif;}
        .guide-item {
            width: 60px; height: 60px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 5px;
            display: flex; align-items: flex-end; justify-content: center; font-size: 10px; padding-bottom: 5px;
        }

        /* --- Reset Notification --- */
        #reset-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 85, 0.8); /* Matches your reset button color */
            color: white;
            padding: 15px 30px;
            border-radius: 5px;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 100; /* Above all canvases and video */
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #reset-notification.show {
            opacity: 1;
            animation: pulse-reset 0.5s ease-in-out;
        }

        @keyframes pulse-reset {
            0% { transform: translate(-50%, -50%) scale(0.9); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <img id="input_video" alt="" />

    <canvas id="gl-canvas"></canvas>
    <canvas id="fx-canvas"></canvas>

    <div id="flash"></div>
    <div id="domain-title">
        <span class="jp" id="title-jp"></span>
        <span class="en" id="title-en"></span>
    </div>

    <div id="ui-layer">
        <div class="status-card">
            <h1>Domain: <span id="domain-name-display">CONNECTING...</span></h1>
            <div id="energy-meter-container">
                <div id="energy-meter-path"><div id="energy-meter-fill"></div></div>
            </div>
        </div>
    </div>

    <div id="guide-layer">
        <div class="guide-item" id="guide-void"><span>Void</span></div>
        <div class="guide-item" id="guide-shrine"><span>Shrine</span></div>
        <div class="guide-item" id="guide-garden"><span>Garden</span></div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script src="js/void_engine.js"></script>
    <script src="js/shrine_engine.js"></script>
    <script src="js/chimera_engine.js"></script>

    <script type="module" src="js/perfection_engine.js"></script> 
    <script type="module" src="js/hakari_engine.js"></script>
    <script type="module" src="js/yuta_engine.js"></script>
    
    <script src="js/main.js"></script>
    <div id="reset-notification">environment reset.</div>
</body>
</html>
</body>
</html>
