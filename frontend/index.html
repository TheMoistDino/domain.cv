<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Expansion CV</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: sans-serif; }
        
        /* The 3D Canvas goes on top */
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; }
        
        /* The actual webcam feed goes behind the 3D canvas */
        #webcam-video {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 1; transform: scaleX(-1); /* Mirror the video */
        }

        /* UI Overlay */
        #ui-layer { 
            position: absolute; top: 20px; left: 20px; z-index: 20; 
            pointer-events: none; /* Allow clicks through to the video if needed */
        }
        
        .status-card {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-left: 4px solid #00ffff;
            pointer-events: auto; /* Re-enable clicks for the button */
        }

        #domain-name-display { color: #00ffff; text-transform: uppercase; }

        #reset-btn {
            margin-top: 20px;
            background: transparent;
            color: #ff0055;
            border: 1px solid #ff0055;
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            transition: 0.3s;
        }

        #reset-btn:hover { background: #ff0055; color: white; }
        #debug-skeleton { position: absolute; bottom: 20px; left: 20px; width: 240px; z-index: 20; border: 2px solid #fff; }

        /* Energy Meter Styles */
        #energy-meter-container { margin-top: 10px; width: 300px; }
        #energy-label { font-size: 12px; letter-spacing: 2px; color: #00ffff; margin-bottom: 5px; }
        #energy-meter-path { width: 100%; height: 10px; background: rgba(255,255,255,0.2); border: 1px solid #00ffff; }
        #energy-meter-fill { width: 0%; height: 100%; background: #00ffff; box-shadow: 0 0 10px #00ffff; transition: width 0.1s; }

        /* Guide Layer Styles */
        #guide-layer {
            position: absolute; top: 20px; right: 20px; z-index: 20;
            display: flex; flex-direction: column; gap: 10px;
        }
        .guide-item {
            width: 60px; height: 60px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 5px;
            display: flex; align-items: flex-end; justify-content: center;
            font-size: 10px; padding-bottom: 5px; background-size: contain; background-repeat: no-repeat;
        }
        /* Your teammate can add background-images of silhouettes here */
    </style>
</head>
<body>
    <video id="webcam-video" autoplay playsinline muted></video>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="status-card">
            <h1>Domain: <span id="domain-name-display"></span></h1>
            
            <div id="energy-meter-container">
                <div id="energy-label">CURSED ENERGY</div>
                <div id="energy-meter-path">
                    <div id="energy-meter-fill"></div>
                </div>
            </div>

            <button id="reset-btn">RESET ENVIRONMENT</button>
        </div>
    </div>
    <img id="debug-skeleton" src="" alt="Backend Skeleton Feed" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="js/scene.js"></script> <script src="js/main.js"></script>

        <div id="guide-layer">
            <div class="guide-item" id="guide-void"><span>Void</span></div>
            <div class="guide-item" id="guide-shrine"><span>Shrine</span></div>
            <div class="guide-item" id="guide-garden"><span>Garden</span></div>
            </div>
</body>
</html>
