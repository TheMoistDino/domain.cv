<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Domain Expansion: Deadly Sentencing</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; cursor:none; font-family:'Noto Serif JP',serif; }

/* THE WATERMARK CENSOR BAR */
#top-mask {
    position: fixed; top: 0; left: 0; width: 100%; height: 60px; 
    background: #000; z-index: 99999; pointer-events: none;
}

/* GIF OVERLAY CONTAINER */
#objection-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 15; /* Sits exactly below the flash */
    display: none; justify-content: center; align-items: center;
}
#objection-gif {
    width: 100vw; 
    height: 100vh; 
    object-fit: cover;
}

#gl-canvas { position:fixed; top:0; left:0; z-index:0; display:block; }
#fx-canvas { position:fixed; top:0; left:0; z-index:1; pointer-events:none; }
#flash { position:fixed;inset:0;z-index:20;pointer-events:none;background:#ffffff;opacity:0; }

#domain-title {
  position:fixed;bottom:50px;left:50%;transform:translateX(-50%);
  z-index:9;text-align:center;opacity:0;pointer-events:none;white-space:nowrap;
}
#domain-title .jp { font-size:12px;letter-spacing:.6em;color:rgba(255,255,255,.9);display:block;margin-bottom:7px;font-weight:900; }
#domain-title .en {
  font-size:28px;letter-spacing:.28em;color:rgba(255,215,0,.9);display:block;font-weight:900;
  text-shadow:0 0 20px rgba(255,215,0,.8),0 0 50px rgba(255,255,255,.6);
}

#video-container {
  position:fixed;bottom:22px;right:22px;width:250px;height:162px;border-radius:10px;
  border:1px solid rgba(255,255,255,.2);overflow:hidden;z-index:12;transform:scaleX(-1);
  box-shadow:0 0 20px rgba(0,0,0,.8);transition:border-color .6s,box-shadow .6s;
}
#video-container.active { border-color:rgba(255,215,0,.8);box-shadow:0 0 40px rgba(255,255,255,.3); }
.input_video { width:100%;height:100%;object-fit:cover;display:block; }
</style>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>
</head>
<body>

<div id="top-mask"></div> 

<div id="objection-container">
    <img id="objection-gif" src="" alt="Objection!">
</div>

<canvas id="gl-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<div id="flash"></div>
<div id="domain-title"><span class="jp">誅伏賜死</span><span class="en">DEADLY SENTENCING</span></div>
<div id="video-container"><video class="input_video" id="input_video" autoplay playsinline></video></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { FlyControls } from 'three/addons/controls/FlyControls.js';

// --- STATE ---
window.currentDomain = 'neutral';
let activePhase = 'idle'; 
let phaseT = 0, domainT = 0, flash = 0, shake = 0, dt = 0, lastTime = 0;

const flashEl = document.getElementById('flash');
const titleEl = document.getElementById('domain-title');
const videoEl = document.getElementById('video-container');
const fxC = document.getElementById('fx-canvas');
const X = fxC.getContext('2d');
const objContainer = document.getElementById('objection-container');
const objGif = document.getElementById('objection-gif');
let W, H;

const canvas = document.getElementById('gl-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ReinhardToneMapping; 
renderer.toneMappingExposure = 2.5; 

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020205, 0); 

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);

const controls = new FlyControls(camera, renderer.domElement);
controls.movementSpeed = 5; 
controls.dragToLook = true;

function resize() {
    W = fxC.width = window.innerWidth; H = fxC.height = window.innerHeight;
    renderer.setSize(W, H); camera.aspect = W / H; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

// --- LIGHTING ---
scene.add(new THREE.AmbientLight(0xffffff, 1.5)); 
const light = new THREE.PointLight(0xffffff, 100, 100);
light.position.set(0, 5, 2);
scene.add(light);

const domainGroup = new THREE.Group();
domainGroup.visible = false;
scene.add(domainGroup);

// --- LOAD MODEL ---
const loader = new GLTFLoader();
loader.load('Domain Expansion Hiromi Higuruma Low-poly 3D model.glb', (gltf) => {
    const model = gltf.scene;
    model.position.set(0, 4.85, 0); 
    domainGroup.add(model);
});

// --- ANIMATION LOOP ---
function animate(now) {
    requestAnimationFrame(animate);
    dt = Math.min((now - (lastTime || now)) / 1000, 0.033); lastTime = now;
    
    // --- TRIGGER ---
    if(window.currentDomain === 'higuruma' && activePhase === 'idle') {
        activePhase = 'intro'; 
        phaseT = 0; domainT = 0; flash = 0; shake = 0;
        
        camera.position.set(200, -400, 20); 
        camera.lookAt(0, -400, 0);

        // START THE GIF
        objContainer.style.display = 'flex';
        // The ?t= trick forces the browser to play it from frame 1
        objGif.src = "objection.gif?t=" + Date.now(); 
    }
    
    if(window.currentDomain === 'neutral' && (activePhase === 'domain' || activePhase === 'intro')) {
        activePhase = 'fadeout';
        phaseT = 0;
    }

    // --- PHASE LOGIC ---
    if(activePhase === 'intro') {
        phaseT += dt; 
        
        // Impact! Screen flashes white at exactly 1.5s (adjust if your GIF is shorter/longer)
        if(phaseT >= 1.5 && phaseT - dt < 1.5) { 
            flash = 2.0; 
            shake = 35.0; 
            objContainer.style.display = 'none'; // Hide the GIF behind the flash
        } 
        
        // Cinematic Camera Panning (Starts after the flash)
        if(phaseT >= 1.5) {
            let panT = Math.min((phaseT - 1.5) / 1.5, 1.0);
            let easeOut = 1 - Math.pow(1 - panT, 3);
            
            camera.position.set(200, -400, 20 * (1 - easeOut)); 
            camera.lookAt(0, -400, 0);
        }

        if(phaseT > 3.0) { 
            activePhase = 'domain'; 
            phaseT = 0; 
            domainT = 0; 
        } 
    } else if(activePhase === 'domain') { 
        domainT += dt; 
        
        // Endless Cinematic Pan 
        let panSpeed = 0.5; 
        let panZ = 10 - Math.cos(domainT * panSpeed) * 10;
        
        camera.position.set(200, -400, panZ);
        camera.lookAt(0, -400, 0);
        
    } else if(activePhase === 'fadeout') {
        phaseT += dt;
        if(phaseT > 1.0) activePhase = 'idle';
    }

    // RENDER 3D (Stays 100% hidden until the GIF finishes at phaseT = 1.5)
    const isShowing = activePhase === 'domain' || activePhase === 'fadeout' || (activePhase === 'intro' && phaseT >= 1.5);
    domainGroup.visible = isShowing;
    
    if(isShowing) renderer.render(scene, camera);
    else renderer.clear();

    // RENDER 2D (Clear it since we aren't drawing the gavel/frames anymore)
    X.clearRect(0, 0, W, H);

    // FX UPDATES
    if(flash > 0.01) { flashEl.style.opacity = Math.min(flash, 1); flash *= 0.88; } else flashEl.style.opacity = 0;
    if(shake > 0.01) {
        const jx = (Math.random() - 0.5) * shake * 10, jy = (Math.random() - 0.5) * shake * 10;
        canvas.style.transform = `translate(${jx}px,${jy}px)`; shake *= 0.85;
    } else canvas.style.transform = '';

    videoEl.classList.toggle('active', activePhase === 'domain');
    titleEl.style.opacity = activePhase === 'domain' ? 1 : 0;
}
requestAnimationFrame(animate);
(async()=>{ try{ const s=await navigator.mediaDevices.getUserMedia({video:true}); document.getElementById('input_video').srcObject=s; }catch(e){} })();
</script>
</body>
</html>
