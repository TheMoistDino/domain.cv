<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Domain Expansion: Authentic Mutual Love</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; cursor:none; font-family:'Noto Serif JP',serif; }
#gl-canvas { position:fixed; top:0; left:0; z-index:0; display:block; }
#fx-canvas { position:fixed; top:0; left:0; z-index:1; pointer-events:none; }

/* The flash is now a pitch black fade-in overlay */
#flash { position:fixed;inset:0;z-index:20;pointer-events:none;background:#050005;opacity:1; }

#domain-title {
  position:fixed;bottom:50px;left:50%;transform:translateX(-50%);
  z-index:9;text-align:center;opacity:0;pointer-events:none;white-space:nowrap;
}
#domain-title .jp { font-size:12px;letter-spacing:.6em;color:rgba(255,200,220,.9);display:block;margin-bottom:7px;font-weight:900; }
#domain-title .en {
  font-size:28px;letter-spacing:.28em;color:rgba(240,245,255,.9);display:block;font-weight:900;
  text-shadow:0 0 20px rgba(200,220,255,.8),0 0 50px rgba(255,150,200,.6),0 0 100px rgba(255,255,255,.4);
}

#video-container {
  position:fixed;bottom:22px;right:22px;width:250px;height:162px;border-radius:10px;
  border:1px solid rgba(255,255,255,.3);overflow:hidden;z-index:12;transform:scaleX(-1);
  box-shadow:0 0 20px rgba(0,0,0,.8);transition:border-color .6s,box-shadow .6s;
}
#video-container.active { border-color:rgba(255,200,230,.8);box-shadow:0 0 40px rgba(255,255,255,.5); }
.input_video { width:100%;height:100%;object-fit:cover;display:block; }
#hint { position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-family:monospace;font-size:10px;color:rgba(255,255,255,.3);z-index:9;letter-spacing:.15em;pointer-events:none; }
</style>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>
</head>
<body>

<canvas id="gl-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<div id="flash"></div>
<div id="domain-title"><span class="jp">真贋相愛</span><span class="en">AUTHENTIC MUTUAL LOVE</span></div>
<div id="video-container"><video class="input_video" id="input_video" autoplay playsinline></video></div>
<div id="hint">Type `window.currentDomain = 'yuta'` in console</div>

<script type="module">
import * as THREE from 'three';
import { FlyControls } from 'three/addons/controls/FlyControls.js';

// --- GLOBAL STATE ---
window.currentDomain = 'neutral';
let prev = 'neutral', phase = 'idle', phaseT = 0, domainT = 0, flash = 1.0, shake = 0, dt = 0, lastTime = 0;

const flashEl = document.getElementById('flash');
const titleEl = document.getElementById('domain-title');
const videoEl = document.getElementById('video-container');
const fxC = document.getElementById('fx-canvas');
const X = fxC.getContext('2d');
let W, H;

// --- THREE.JS SETUP ---
const canvas = document.getElementById('gl-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9; 

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x11131a, 0.025);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 3, 20);

const controls = new FlyControls(camera, renderer.domElement);
controls.movementSpeed = 25; controls.rollSpeed = Math.PI / 6; controls.autoForward = false; controls.dragToLook = true;

function resize() {
    W = fxC.width = window.innerWidth; H = fxC.height = window.innerHeight;
    renderer.setSize(W, H); camera.aspect = W / H; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

// --- LIGHTING ---
scene.add(new THREE.AmbientLight(0x202535, 0.8)); 
const paleMoon = new THREE.DirectionalLight(0xaaccff, 1.5); paleMoon.position.set(20, 50, -30); scene.add(paleMoon);
const crossLight1 = new THREE.PointLight(0xffccdd, 400, 100); crossLight1.position.set(-25, 15, -45); scene.add(crossLight1);
const crossLight2 = new THREE.PointLight(0xffffff, 400, 100); crossLight2.position.set(25, 20, -50); scene.add(crossLight2);

// --- THE DOMAIN ---
const domainGroup = new THREE.Group();
domainGroup.visible = false;
scene.add(domainGroup);

const floorGeo = new THREE.PlaneGeometry(250, 250, 64, 64);
const posAttr = floorGeo.attributes.position;
for(let i = 0; i < posAttr.count; i++) posAttr.setZ(i, (Math.random() - 0.5) * 1.5);
floorGeo.computeVertexNormals();
const floor = new THREE.Mesh(floorGeo, new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.9, metalness: 0.1, flatShading: true }));
floor.rotation.x = -Math.PI / 2;
domainGroup.add(floor);

const swordCount = 800;
const dummy = new THREE.Object3D();
const blades = new THREE.InstancedMesh(new THREE.BoxGeometry(0.08, 2.5, 0.2), new THREE.MeshStandardMaterial({ color: 0x8899aa, metalness: 0.9, roughness: 0.2 }), swordCount);
const guards = new THREE.InstancedMesh(new THREE.BoxGeometry(0.3, 0.05, 0.4), new THREE.MeshStandardMaterial({ color: 0xbba355, metalness: 0.8, roughness: 0.4 }), swordCount);
const grips = new THREE.InstancedMesh(new THREE.CylinderGeometry(0.06, 0.06, 0.8, 8), new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 }), swordCount);

for(let i = 0; i < swordCount; i++) {
    const r = 5 + Math.random() * 80, theta = Math.random() * Math.PI * 2;
    const sx = Math.cos(theta) * r, sz = Math.sin(theta) * r;
    const sy = -0.2 - Math.random() * 0.8; 
    const rotX = (Math.random() - 0.5) * 0.4, rotZ = (Math.random() - 0.5) * 0.4, rotY = Math.random() * Math.PI;

    dummy.position.set(sx, sy + 1.25, sz); dummy.rotation.set(rotX, rotY, rotZ); dummy.updateMatrix(); blades.setMatrixAt(i, dummy.matrix);
    dummy.position.set(sx, sy + 2.5, sz); dummy.updateMatrix(); guards.setMatrixAt(i, dummy.matrix);
    dummy.position.set(sx, sy + 2.9, sz); dummy.updateMatrix(); grips.setMatrixAt(i, dummy.matrix);
}
domainGroup.add(blades); domainGroup.add(guards); domainGroup.add(grips);

const crossMat = new THREE.MeshStandardMaterial({ color: 0x050508, roughness: 0.8 });
function createGiantCross(x, z, height, tilt) {
    const group = new THREE.Group();
    const main = new THREE.Mesh(new THREE.BoxGeometry(2, height, 2), crossMat); main.position.y = height / 2; group.add(main);
    const cross = new THREE.Mesh(new THREE.BoxGeometry(2, height, 2), crossMat); cross.scale.set(1, 0.4, 1); cross.position.y = height * 0.7; cross.rotation.z = Math.PI / 2; group.add(cross);
    const diag = new THREE.Mesh(new THREE.BoxGeometry(2, height, 2), crossMat); diag.scale.set(0.6, 0.6, 0.6); diag.position.y = height * 0.6; diag.rotation.z = Math.PI / 4; group.add(diag);
    group.position.set(x, 0, z); group.rotation.z = tilt; group.rotation.y = (Math.random() - 0.5); return group;
}
domainGroup.add(createGiantCross(-25, -45, 35, 0.1)); domainGroup.add(createGiantCross(25, -50, 45, -0.15));

const emberCount = 300;
const emberPos = new Float32Array(emberCount * 3);
const emberVel = [];
for(let i=0; i<emberCount; i++) {
    emberPos[i*3] = (Math.random() - 0.5) * 80; emberPos[i*3+1] = Math.random() * 20; emberPos[i*3+2] = (Math.random() - 0.5) * 80;
    emberVel.push({ y: 0.01 + Math.random() * 0.03, x: (Math.random() - 0.5) * 0.02, z: (Math.random() - 0.5) * 0.02 });
}
const emberGeo = new THREE.BufferGeometry(); emberGeo.setAttribute('position', new THREE.BufferAttribute(emberPos, 3));
const embers = new THREE.Points(emberGeo, new THREE.PointsMaterial({ color: 0xffccdd, size: 0.2, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending }));
domainGroup.add(embers);

// --- ANIMATION LOOP ---
function animate(now) {
    requestAnimationFrame(animate);
    dt = Math.min((now - (lastTime || now)) / 1000, 0.033); lastTime = now;
    
    // Only allow fly controls after the cinematic intro finishes
    if(phase === 'domain') {
        controls.update(dt);
    }

    if(window.currentDomain === 'yuta' && prev === 'neutral') {
        // TRIGGER CINEMATIC FLY-IN
        phase = 'flyin'; phaseT = 0; domainT = 0; flash = 1.0; shake = 2.0;
        
        // Reset camera to the absolute edge of the domain for the run-up
        camera.position.set(15, 1.0, 80);
    }
    if(window.currentDomain === 'neutral' && prev === 'yuta') { phase = 'fadeout'; phaseT = 0; }
    prev = window.currentDomain;

    if(phase === 'flyin') {
        phaseT += dt; 
        
        // As the camera slows down, the shake tapers off smoothly
        shake = Math.max(0, 2.0 - phaseT); 
        
        // End intro after 2.5 seconds
        if(phaseT > 2.5) { phase = 'domain'; phaseT = 0; shake = 0; } 
        
    } else if(phase === 'domain') { 
        domainT += dt; shake = 0;
    } else if(phase === 'fadeout') { 
        phaseT += dt; domainT += dt; if(phaseT > 2.5) phase = 'idle'; 
    }

    if(phase === 'flyin' || phase === 'domain' || phase === 'fadeout') {
        domainGroup.visible = true;

        if (phase === 'flyin') {
            // CINEMATIC CAMERA LOGIC
            // Calculate progress from 0.0 to 1.0 over 2.5 seconds
            const progress = Math.min(phaseT / 2.5, 1.0);
            
            // Quartic ease-out function (starts very fast, slows down beautifully)
            const ease = 1 - Math.pow(1 - progress, 4); 

            // Interpolate the camera rushing forward through the swords
            camera.position.set(
                15 * (1 - ease) + 0 * ease,   // Sweep in from the right (X: 15 to 0)
                1.0 * (1 - ease) + 3.0 * ease, // Start low to the ground (Y: 1 to 3)
                80 * (1 - ease) + 20 * ease    // Rush forward from the edge (Z: 80 to 20)
            );
            
            // Lock focus on the giant crosses during the sprint
            camera.lookAt(0, 8, -45); 

        } else if (phase === 'domain') {
            // ETHEREAL HOVER LOGIC
            // Once we land, gently float up and down like before
            camera.position.y += Math.sin(domainT * 0.5) * 0.005;
        }

        // Animate drifting embers
        const positions = embers.geometry.attributes.position.array;
        for(let i=0; i<emberCount; i++) {
            const v = emberVel[i]; 
            positions[i*3+1] += v.y; 
            positions[i*3] += v.x + Math.sin(domainT * 2 + i) * 0.01; 
            positions[i*3+2] += v.z + Math.cos(domainT * 2 + i) * 0.01;
            if(positions[i*3+1] > 20) positions[i*3+1] = 0; 
        }
        embers.geometry.attributes.position.needsUpdate = true;
        
        renderer.render(scene, camera);
    } else { 
        domainGroup.visible = false; renderer.clear(); 
    }

    X.clearRect(0, 0, W, H); // Clean up 2D canvas since everything is 3D now

    // FLASH & SHAKE
    if(flash > 0.004) { flashEl.style.opacity = Math.min(flash, 1.0); flash *= 0.90; } else { flashEl.style.opacity = 0; flash = 0; }
    if(shake > 0.01) {
        const jx = (Math.random() - 0.5) * shake * 15, jy = (Math.random() - 0.5) * shake * 15;
        canvas.style.transform = fxC.style.transform = `translate(${jx}px,${jy}px)`; shake *= 0.85;
    } else { canvas.style.transform = fxC.style.transform = ''; shake = 0; }

    // Activate the webcam border right as the camera finishes landing
    videoEl.classList.toggle('active', phase === 'domain' || (phase === 'flyin' && phaseT > 2.0));
    
    // Fade the title in during the last 0.7 seconds of the cinematic fly-in!
    if (phase === 'domain') {
        titleEl.style.opacity = 1;
    } else if (phase === 'flyin' && phaseT > 1.8) {
        titleEl.style.opacity = Math.min(1, (phaseT - 1.8) / 0.7);
    } else {
        titleEl.style.opacity = 0;
    }

}
requestAnimationFrame(animate);
(async()=>{ try{ const s=await navigator.mediaDevices.getUserMedia({video:true}); document.getElementById('input_video').srcObject=s; }catch(e){} })();
</script>
</body>
</html>
