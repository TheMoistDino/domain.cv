<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eight-Handled Sword Divergent Sila Divine General Mahoraga</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; cursor:none; font-family:'Noto Serif JP',serif; }

#top-mask {
    position: fixed; top: 0; left: 0; width: 100%; height: 60px; 
    background: #000; z-index: 99999; pointer-events: none;
}

#gl-canvas { position:fixed; top:0; left:0; z-index:0; display:block; }
#fx-canvas { position:fixed; top:0; left:0; z-index:1; pointer-events:none; }
#flash { position:fixed;inset:0;z-index:20;pointer-events:none;background:#ffffff;opacity:0; }

#domain-title {
  position:fixed;bottom:50px;left:50%;transform:translateX(-50%);
  z-index:9;text-align:center;opacity:0;pointer-events:none;white-space:nowrap;
}
#domain-title .jp { font-size:12px;letter-spacing:.6em;color:rgba(255,255,255,.9);display:block;margin-bottom:7px;font-weight:900; }
#domain-title .en {
  font-size:26px;letter-spacing:.28em;color:rgba(255,215,0,.9);display:block;font-weight:900;
  text-shadow:0 0 20px rgba(255,215,0,.8),0 0 50px rgba(255,255,255,.6);
}

#video-container {
  position:fixed;bottom:22px;right:22px;width:250px;height:162px;border-radius:10px;
  border:1px solid rgba(255,255,255,.2);overflow:hidden;z-index:12;transform:scaleX(-1);
  box-shadow:0 0 20px rgba(0,0,0,.8);transition:border-color .6s,box-shadow .6s;
}
#video-container.active { border-color:rgba(255,215,0,.8);box-shadow:0 0 40px rgba(255,255,255,.3); }
.input_video { width:100%;height:100%;object-fit:cover;display:block; }
</style>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>
</head>
<body>

<div id="top-mask"></div> 
<canvas id="gl-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<div id="flash"></div>
<div id="domain-title"><span class="jp">八握剣異戒神将魔虚羅</span><span class="en">DIVINE GENERAL MAHORAGA</span></div>
<div id="video-container"><video class="input_video" id="input_video" autoplay playsinline></video></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- STATE ---
window.currentDomain = 'neutral';
let activePhase = 'idle'; 
let phaseT = 0, domainT = 0, flash = 0, shake = 0, dt = 0, lastTime = 0;

const flashEl = document.getElementById('flash');
const titleEl = document.getElementById('domain-title');
const videoEl = document.getElementById('video-container');
const fxC = document.getElementById('fx-canvas');
const X = fxC.getContext('2d');
let W, H;

const canvas = document.getElementById('gl-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ReinhardToneMapping; 
renderer.toneMappingExposure = 2.5; 

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020205, 0.02); // Added a little fog to make him look massive

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);

function resize() {
    W = fxC.width = window.innerWidth; H = fxC.height = window.innerHeight;
    renderer.setSize(W, H); camera.aspect = W / H; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

// --- LIGHTING ---
scene.add(new THREE.AmbientLight(0x404050, 1.0)); 
const light = new THREE.DirectionalLight(0xfff0dd, 3.0);
light.position.set(0, 50, 20); // Overhead lighting for dramatic shadows
scene.add(light);

const domainGroup = new THREE.Group();
domainGroup.visible = false;
scene.add(domainGroup);

// --- LOAD MAHORAGA MODEL ---
const loader = new GLTFLoader();
loader.load('mahoraga.glb', (gltf) => {
    const model = gltf.scene;
    // You may need to adjust this depending on the scale of your .glb
    model.position.set(0, 0, 0); 
    domainGroup.add(model);
});

// --- MAHORAGA WHEEL FX ---
function drawWheel(t) {
    X.clearRect(0, 0, W, H);
    const cx = W / 2, cy = H / 2;
    let angle = 0;

    // Phase 1: Spin slowly once (0s to 2.0s)
    if (t < 2.0) {
        let p = t / 2.0;
        // Ease In-Out curve
        let ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2; 
        angle = ease * Math.PI * 2;
    } 
    // Phase 2: Spin twice, faster (2.0s to 3.5s)
    else if (t < 3.5) {
        let p = (t - 2.0) / 1.5;
        let ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
        angle = (Math.PI * 2) + (ease * Math.PI * 4);
    } 
    else {
        return; // Stop drawing after 3.5s (Flash happens here)
    }

    // Draw the 8-Handled Wheel
    X.save();
    X.translate(cx, cy);
    X.rotate(angle);

    // Glowing Gold Style
    X.strokeStyle = '#d4af37';
    X.fillStyle = '#d4af37';
    X.lineWidth = 12;
    X.shadowColor = '#d4af37';
    X.shadowBlur = 20;

    // Inner and Outer Rings
    X.beginPath(); X.arc(0, 0, 40, 0, Math.PI*2); X.stroke();
    X.beginPath(); X.arc(0, 0, 140, 0, Math.PI*2); X.stroke();

    // 8 Handles
    for(let i = 0; i < 8; i++) {
        X.save();
        X.rotate((Math.PI * 2 * i) / 8);
        
        // Spoke
        X.beginPath(); X.moveTo(40, 0); X.lineTo(190, 0); X.stroke();
        // Crossbar
        X.beginPath(); X.moveTo(170, -15); X.lineTo(170, 15); X.lineWidth = 8; X.stroke();
        // End Sphere
        X.beginPath(); X.arc(190, 0, 12, 0, Math.PI*2); X.fill();
        
        X.restore();
    }
    X.restore();
}

// --- ANIMATION LOOP ---
function animate(now) {
    requestAnimationFrame(animate);
    dt = Math.min((now - (lastTime || now)) / 1000, 0.033); lastTime = now;
    
    // --- TRIGGER ---
    if(window.currentDomain === 'mahoraga' && activePhase === 'idle') {
        activePhase = 'intro'; 
        phaseT = 0; domainT = 0; flash = 0; shake = 0;
    }
    
    if(window.currentDomain === 'neutral' && (activePhase === 'domain' || activePhase === 'intro')) {
        activePhase = 'fadeout';
        phaseT = 0;
    }

    // --- PHASE LOGIC ---
    if(activePhase === 'intro') {
        phaseT += dt; 
        
        // Impact! Screen goes white exactly when the final spin finishes (3.5s)
        if(phaseT >= 3.5 && phaseT - dt < 3.5) { flash = 2.0; shake = 40.0; } 

        // Transition to 3D scene after the flash peaks
        if(phaseT > 3.6) { 
            activePhase = 'domain'; 
            phaseT = 0; 
            domainT = 0; 
        } 
    } else if(activePhase === 'domain') { 
        domainT += dt; 
        
        // --- CINEMATIC VERTICAL PAN ---
        // Pans down over 4 seconds, then locks onto Mahoraga
        let panProgress = Math.min(domainT / 4.0, 1.0);
        
        // Smooth deceleration easing
        let easeOut = 1 - Math.pow(1 - panProgress, 4); 

        // THE FIX: Changed '25' to '15'. 
        // Y starts at 30 (Looking from top) and drops to 15 (Waist/Chest level)
        let currentY = 30 - (15 * easeOut);
        
        // Z stays at 20 so you are standing in front of him
        camera.position.set(0, currentY, 20);
        
        // Camera looks slightly down toward his center
        camera.lookAt(0, currentY - 5, 0);
        
    } else if(activePhase === 'fadeout') {
        phaseT += dt;
        if(phaseT > 1.0) activePhase = 'idle';
    }

    // RENDER 3D (Hidden until t=3.5s)
    const isShowing = activePhase === 'domain' || activePhase === 'fadeout' || (activePhase === 'intro' && phaseT >= 3.5);
    domainGroup.visible = isShowing;
    
    if(isShowing) renderer.render(scene, camera);
    else renderer.clear();

    // RENDER 2D
    if(activePhase === 'intro') drawWheel(phaseT);
    else X.clearRect(0, 0, W, H);

    // FX UPDATES
    if(flash > 0.01) { flashEl.style.opacity = Math.min(flash, 1); flash *= 0.88; } else flashEl.style.opacity = 0;
    if(shake > 0.01) {
        const jx = (Math.random() - 0.5) * shake * 10, jy = (Math.random() - 0.5) * shake * 10;
        canvas.style.transform = `translate(${jx}px,${jy}px)`; shake *= 0.85;
    } else canvas.style.transform = '';

    videoEl.classList.toggle('active', activePhase === 'domain');
    titleEl.style.opacity = activePhase === 'domain' ? 1 : 0;
}
requestAnimationFrame(animate);
(async()=>{ try{ const s=await navigator.mediaDevices.getUserMedia({video:true}); document.getElementById('input_video').srcObject=s; }catch(e){} })();
</script>
</body>
</html>
