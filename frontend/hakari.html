<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Domain Expansion: Idle Death Gamble</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; cursor:none; font-family:'Noto Serif JP',serif; }
#gl-canvas { position:fixed; top:0; left:0; z-index:0; display:block; }
#fx-canvas { position:fixed; top:0; left:0; z-index:1; pointer-events:none; }
#flash { position:fixed;inset:0;z-index:20;pointer-events:none;background:#fff;opacity:0; }

#domain-title {
  position:fixed;bottom:50px;left:50%;transform:translateX(-50%);
  z-index:9;text-align:center;opacity:0;pointer-events:none;white-space:nowrap;
}
#domain-title .jp { font-size:12px;letter-spacing:.6em;color:rgba(255,100,200,.9);display:block;margin-bottom:7px;font-weight:900; }
#domain-title .en {
  font-size:30px;letter-spacing:.28em;color:rgba(255,215,0,.9);display:block;font-weight:900;
  text-shadow:0 0 20px rgba(255,215,0,.9),0 0 50px rgba(255,50,150,.8),0 0 100px rgba(255,0,100,.5);
}

#video-container {
  position:fixed;bottom:22px;right:22px;width:250px;height:162px;border-radius:10px;
  border:1px solid rgba(255,215,0,.4);overflow:hidden;z-index:12;transform:scaleX(-1);
  box-shadow:0 0 20px rgba(0,0,0,.8);transition:border-color .6s,box-shadow .6s;
}
#video-container.active { border-color:rgba(255,50,200,.8);box-shadow:0 0 40px rgba(255,215,0,.6); }
.input_video { width:100%;height:100%;object-fit:cover;display:block; }
#hint { position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-family:monospace;font-size:10px;color:rgba(255,255,255,.3);z-index:9;letter-spacing:.15em;pointer-events:none; }
</style>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>
</head>
<body>

<canvas id="gl-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<div id="flash"></div>
<div id="domain-title"><span class="jp">坐殺博徒</span><span class="en">IDLE DEATH GAMBLE</span></div>
<div id="video-container"><video class="input_video" id="input_video" autoplay playsinline></video></div>
<div id="hint">Type `window.currentDomain = 'hakari'` in console</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { FlyControls } from 'three/addons/controls/FlyControls.js';

// --- GLOBAL STATE ---
window.currentDomain = 'neutral';
let prev = 'neutral', phase = 'idle', phaseT = 0, domainT = 0, flash = 0, shake = 0, dt = 0, lastTime = 0;

const flashEl = document.getElementById('flash');
const titleEl = document.getElementById('domain-title');
const videoEl = document.getElementById('video-container');
const fxC = document.getElementById('fx-canvas');
const X = fxC.getContext('2d');
let W, H;

// --- THREE.JS SETUP ---
const canvas = document.getElementById('gl-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a0520, 0.015);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 15);

const controls = new FlyControls(camera, renderer.domElement);
controls.movementSpeed = 40;
controls.rollSpeed = Math.PI / 6;
controls.autoForward = false;
controls.dragToLook = true;

function resize() {
    W = fxC.width = window.innerWidth; H = fxC.height = window.innerHeight;
    renderer.setSize(W, H); camera.aspect = W / H; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// --- LIGHTING ---
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const lightPink = new THREE.PointLight(0xff00aa, 600, 100); lightPink.position.set(-15, 15, -10); scene.add(lightPink);
const lightGold = new THREE.PointLight(0xffd700, 600, 100); lightGold.position.set(15, 15, -10); scene.add(lightGold);

// --- THE DOMAIN ---
const domainGroup = new THREE.Group();
domainGroup.visible = false;
scene.add(domainGroup);

// 1. Floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.8 }));
floor.rotation.x = -Math.PI / 2;
domainGroup.add(floor);
domainGroup.add(new THREE.GridHelper(200, 40, 0xff00aa, 0x440044));

// 2. LOADING YOUR SLOT MACHINE MODEL
const loader = new GLTFLoader();
loader.load('./slot_machine.glb', function(gltf) {
    const originalSlot = gltf.scene;
    originalSlot.scale.set(12, 12, 12); 

    for(let z = -60; z < 30; z += 12) {
        const slotL = originalSlot.clone();
        slotL.position.set(-15, 0, z);
        slotL.rotation.y = Math.PI / 2.5;
        domainGroup.add(slotL);

        const slotR = originalSlot.clone();
        slotR.position.set(15, 0, z);
        slotR.rotation.y = -Math.PI / 2.5;
        domainGroup.add(slotR);
    }
});

// 3. Giant Screen, Frame, and Backdrop
// The 7-7-7 Screen
const reelMat = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `uniform float time; varying vec2 vUv; void main() { float r1 = step(0.1, fract(vUv.y * 5.0 - time * 10.0)); float r2 = step(0.1, fract(vUv.y * 5.0 - time * 12.0)); float r3 = step(0.1, fract(vUv.y * 5.0 - time * 8.0)); vec3 color = vec3(0.05); if (vUv.x < 0.33) color = mix(color, vec3(1.0, 0.0, 0.5), r1); else if (vUv.x < 0.66) color = mix(color, vec3(0.0, 1.0, 0.5), r2); else color = mix(color, vec3(1.0, 0.8, 0.0), r3); gl_FragColor = vec4(color, 1.0); }`,
    side: THREE.DoubleSide
});
const giantScreen = new THREE.Mesh(new THREE.PlaneGeometry(40, 20), reelMat);
giantScreen.position.set(0, 18, -39.5);
domainGroup.add(giantScreen);

// NEW: Thick Metallic TV Frame
const frameGeo = new THREE.BoxGeometry(42, 22, 2);
const frameMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.2 });
const tvFrame = new THREE.Mesh(frameGeo, frameMat);
tvFrame.position.set(0, 18, -41);
domainGroup.add(tvFrame);

// NEW: Spinning Neon Sunburst
const sunburstGroup = new THREE.Group();
sunburstGroup.position.set(0, 18, -42);
const barGeo = new THREE.BoxGeometry(0.8, 70, 0.8);
const barMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 2.0 });
for(let i=0; i<16; i++) {
    const bar = new THREE.Mesh(barGeo, barMat);
    bar.rotation.z = (i / 16) * Math.PI;
    sunburstGroup.add(bar);
}
domainGroup.add(sunburstGroup);

// NEW: Intense Magenta Backlight
const tvBacklight = new THREE.PointLight(0xff00aa, 800, 120);
tvBacklight.position.set(0, 18, -45);
domainGroup.add(tvBacklight);

// NEW: Enclosing Back Wall to catch the light
const backWall = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 100),
    new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 0.8, roughness: 0.1 })
);
backWall.position.set(0, 20, -55);
domainGroup.add(backWall);

// 4. Pachinko Balls
const ballCount = 400;
const ballMesh = new THREE.InstancedMesh(new THREE.SphereGeometry(0.5, 12, 12), new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 1.0, roughness: 0.1 }), ballCount);
const ballData = [];
const dummy = new THREE.Object3D();
for(let i = 0; i < ballCount; i++) {
    ballData.push({ x: (Math.random()-0.5)*80, y: Math.random()*50, z: (Math.random()-0.5)*80-10, vy: -Math.random()*0.4, bounce: 0.6+Math.random()*0.3 });
}
domainGroup.add(ballMesh);

// --- 2D FX (TRAIN DOORS) ---
// --- 2D FX (TRAIN DOORS) ---
// --- 2D FX (TRAIN DOORS) ---
const DOORS = [
    // BACK DOOR (Drawn first, opens last, Gold, smallest)
    { delay: 1.0, speed: 4.5, colorBase: 180, accent: '#ffd700', open: 0, scale: 0.8 },
    // MIDDLE DOOR (Drawn second, opens second, Cyan, medium)
    { delay: 0.5, speed: 3.5, colorBase: 100, accent: '#00ffff', open: 0, scale: 0.9 },
    // FRONT DOOR (Drawn last, opens first, Pink, full screen)
    { delay: 0.0, speed: 2.5, colorBase: 50, accent: '#ff00aa', open: 0, scale: 1.0 }
];

function drawTrainDoors() {
    X.clearRect(0, 0, W, H);
    const halfW = W / 2;
    
    // Draw a dark tunnel background so we don't see the 3D domain until the final door opens
    if (DOORS[0].open < 1.0) {
        X.fillStyle = '#050508';
        X.fillRect(0, 0, W, H);
    }

    DOORS.forEach(d => {
        if (phaseT > d.delay) d.open += dt * d.speed;
        
        const p = Math.min(Math.max(d.open, 0), 1.2);
        const ease = p < 0.5 ? 2 * p * p : -1 + (4 - 2 * p) * p;
        
        // Apply perspective scale to make a "tunnel"
        const dHeight = H * d.scale;
        const yOffset = (H - dHeight) / 2;
        const dWidth = halfW * d.scale;
        const xOffsetLeft = halfW - dWidth;
        
        const offset = ease * dWidth;
        
        // If this door is completely off-screen, skip drawing it
        if (offset >= dWidth) return; 
        
        // Left Door Gradient
        const gradL = X.createLinearGradient(xOffsetLeft - offset, 0, halfW - offset, 0);
        gradL.addColorStop(0, `rgb(${d.colorBase-30}, ${d.colorBase-30}, ${d.colorBase-30})`);
        gradL.addColorStop(0.7, `rgb(${d.colorBase+40}, ${d.colorBase+40}, ${d.colorBase+50})`);
        gradL.addColorStop(1, `rgb(${d.colorBase}, ${d.colorBase}, ${d.colorBase})`);
        
        X.fillStyle = gradL; 
        X.fillRect(xOffsetLeft - offset, yOffset, dWidth, dHeight); 
        
        // Right Door Gradient
        const gradR = X.createLinearGradient(halfW + offset, 0, halfW + dWidth + offset, 0);
        gradR.addColorStop(0, `rgb(${d.colorBase}, ${d.colorBase}, ${d.colorBase})`);
        gradR.addColorStop(0.3, `rgb(${d.colorBase+40}, ${d.colorBase+40}, ${d.colorBase+50})`);
        gradR.addColorStop(1, `rgb(${d.colorBase-30}, ${d.colorBase-30}, ${d.colorBase-30})`);

        X.fillStyle = gradR;
        X.fillRect(halfW + offset, yOffset, dWidth, dHeight);

        // Glowing Rubber Strips
        X.fillStyle = d.accent; 
        X.fillRect(halfW - offset - (12 * d.scale), yOffset, 12 * d.scale, dHeight); 
        X.fillRect(halfW + offset, yOffset, 12 * d.scale, dHeight);
        
        // Tinted Windows
        X.fillStyle = 'rgba(10, 15, 20, 0.9)'; 
        const winW = 120 * d.scale;
        const winH = H * 0.45 * d.scale;
        const winY = yOffset + (dHeight * 0.25);
        X.fillRect(halfW - offset - (180 * d.scale), winY, winW, winH);
        X.fillRect(halfW + offset + (60 * d.scale), winY, winW, winH);
        
        // Window Frames
        X.strokeStyle = '#111';
        X.lineWidth = 6 * d.scale;
        X.strokeRect(halfW - offset - (180 * d.scale), winY, winW, winH);
        X.strokeRect(halfW + offset + (60 * d.scale), winY, winW, winH);
        
        // Outer Door Frame Outline
        X.strokeStyle = '#000';
        X.lineWidth = 4;
        X.strokeRect(xOffsetLeft, yOffset, dWidth * 2, dHeight);
    });
}

// --- ANIMATION LOOP ---
function animate(now) {
    requestAnimationFrame(animate);
    dt = Math.min((now - (lastTime || now)) / 1000, 0.033); lastTime = now;
    controls.update(dt);

    if(window.currentDomain === 'hakari' && prev === 'neutral') {
        phase = 'doors'; phaseT = 0; domainT = 0; flash = 0; shake = 2.0;
        DOORS.forEach(d => d.open = 0);
    }
    if(window.currentDomain === 'neutral' && prev === 'hakari') { phase = 'fadeout'; phaseT = 0; }
    prev = window.currentDomain;

    if(phase === 'doors') {
        phaseT += dt; shake = Math.max(shake, 1.5 + Math.random() * 2.0);
        if(phaseT > 2.0) { phase = 'settle'; phaseT = 0; flash = 1.0; shake = 6.0; } 
    } else if(phase === 'settle') {
        phaseT += dt; domainT += dt; if(phaseT > 0.8) { phase = 'domain'; phaseT = 0; shake = 0; }
    } else if(phase === 'domain') { domainT += dt; shake = 0;
    } else if(phase === 'fadeout') { phaseT += dt; domainT += dt; if(phaseT > 1.2) phase = 'idle'; }

    if(phase === 'domain' || phase === 'settle' || phase === 'fadeout') {
        domainGroup.visible = true;
        
        // Screens & Backdrop Animation
        reelMat.uniforms.time.value = domainT;
        sunburstGroup.rotation.z = domainT * -0.5; // Slowly spin the sunburst
        
        // Fever Mode Pulsing Lights
        const pulse = Math.sin(domainT * 12);
        lightPink.intensity = 400 + pulse * 300;
        lightGold.intensity = 400 - pulse * 300;
        tvBacklight.intensity = 600 + Math.cos(domainT * 10) * 400; // Pulsing Backlight

        // Physics
        for(let i=0; i<ballCount; i++) {
            let b = ballData[i]; b.vy -= 9.8 * dt; b.y += b.vy * dt;
            if (b.y < 0.5) { b.y = 0.5; b.vy = Math.abs(b.vy) * b.bounce; }
            dummy.position.set(b.x, b.y, b.z); dummy.updateMatrix(); ballMesh.setMatrixAt(i, dummy.matrix);
        }
        ballMesh.instanceMatrix.needsUpdate = true;
        renderer.render(scene, camera);
    } else { domainGroup.visible = false; renderer.clear(); }

    if(phase === 'doors' || phase === 'settle') drawTrainDoors();

    if(flash > 0.004) { flashEl.style.opacity = flash; flash *= 0.85; } else { flashEl.style.opacity = 0; flash = 0; }
    if(shake > 0.01) {
        const jx = (Math.random() - 0.5) * shake * 30, jy = (Math.random() - 0.5) * shake * 30;
        canvas.style.transform = fxC.style.transform = `translate(${jx}px,${jy}px)`; shake *= 0.88;
    } else { canvas.style.transform = fxC.style.transform = ''; shake = 0; }

    videoEl.classList.toggle('active', phase === 'domain');
    titleEl.style.opacity = phase === 'domain' && domainT > 0.5 ? Math.min(1, (domainT - 0.5) / 0.5) : 0;
}
requestAnimationFrame(animate);
(async()=>{ try{ const s=await navigator.mediaDevices.getUserMedia({video:true}); document.getElementById('input_video').srcObject=s; }catch(e){} })();
</script>
</body>
</html>
