<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>test_domain.cv</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; }
        img { border: 2px solid #ff0055; border-radius: 8px; margin-top: 20px; max-width: 100%; }
        h1 { color: #00ffcc; }
        .data-readout { color: #aaa; font-family: monospace; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Detected Domain: <span id="domain-output">Connecting...</span></h2>
    <div class="data-readout">Charge Progress: <span id="progress-output">0.0</span></div>
    
    <img id="result-image" src="" alt="Waiting for server..." />

    <script>
        const resultImage = document.getElementById('result-image');
        const domainOutput = document.getElementById('domain-output');
        const progressOutput = document.getElementById('progress-output');

        // Connect to your FastAPI WebSocket
        const ws = new WebSocket("ws://localhost:8000/ws");

        ws.onopen = () => {
            domainOutput.innerText = "Neutral (Connected)";
            console.log("Successfully connected to the backend!");
        };

        // Handle the incoming data from FastAPI passively
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // Update the text
            domainOutput.innerText = data.domain.toUpperCase().replace(/_/g, ' ');
            
            // Check if progress exists (in case you are testing early backend code)
            if (data.progress !== undefined) {
                progressOutput.innerText = data.progress.toFixed(2);
            }

            // Update the image with the MediaPipe skeleton
            if (data.image) {
                resultImage.src = data.image; 
            }
        };

        ws.onerror = (err) => {
            console.error("WebSocket error:", err);
            domainOutput.innerText = "Connection Error (See Console)";
        };
        
        ws.onclose = () => {
            domainOutput.innerText = "Disconnected from Server";
        }
    </script>
</body>
</html>
