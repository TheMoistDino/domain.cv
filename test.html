<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Domain Expansion - Server Test</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; }
        img { border: 2px solid #ff0055; border-radius: 8px; margin-top: 20px; max-width: 100%; }
        h1 { color: #00ffcc; }
    </style>
</head>
<body>
    <h2>Detected Domain: <span id="domain-output">Connecting...</span></h2>
    
    <video id="video" autoplay style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <img id="result-image" src="" alt="Waiting for server..." />

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultImage = document.getElementById('result-image');
        const domainOutput = document.getElementById('domain-output');

        // Connect to your FastAPI WebSocket
        const ws = new WebSocket("ws://localhost:8000/ws");

        // Request webcam access
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            video.srcObject = stream;
        }).catch(err => console.error("Webcam error:", err));

        ws.onopen = () => {
            domainOutput.innerText = "Neutral (Connected)";
            
            // Send a frame every 100ms (10 FPS) to keep the server from crashing under load
            setInterval(() => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Convert frame to Base64 and send
                    const base64Data = canvas.toDataURL('image/jpeg', 0.5);
                    ws.send(base64Data);
                }
            }, 100); 
        };

        // Handle the incoming data from FastAPI
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            domainOutput.innerText = data.domain.toUpperCase().replace('_', ' ');
            resultImage.src = data.image; // Updates the image with the MediaPipe skeleton
        };
    </script>
</body>
</html>
